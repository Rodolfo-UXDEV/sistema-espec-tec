<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <!-- Document Body Gradient -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <!-- Corner Gradient -->
    <linearGradient id="cornerGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7d2fe" />
      <stop offset="100%" stop-color="#e0e7ff" />
    </linearGradient>
    <!-- Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Document Shape with shadow -->
  <path d="M10 4h20l10 10v28a4 4 0 0 1-4 4H10a4 4 0 0 1-4-4V8a4 4 0 0 1 4-4z" fill="url(#bodyGrad)" filter="url(#shadow)" />
  
  <!-- Folded Corner -->
  <path d="M30 4v10h10L30 4z" fill="url(#cornerGrad)" />
  
  <!-- Lines of Text/Spec (technical document feeling) -->
  <rect x="12" y="20" width="24" height="3" rx="1.5" fill="#ffffff" fill-opacity="0.9" />
  <rect x="12" y="27" width="24" height="3" rx="1.5" fill="#ffffff" fill-opacity="0.9" />
  <rect x="12" y="34" width="14" height="3" rx="1.5" fill="#ffffff" fill-opacity="0.9" />
</svg>